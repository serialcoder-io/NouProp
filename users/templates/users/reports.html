{% extends "cotton/components/layout/base.html" %}
{% load static %}

{% block extra_head %}
    <link href="{% static 'css/quill.snow.css' %}" rel="stylesheet">
{% endblock %}

{% block title %}
    <title>My reports</title>
{% endblock %} 

{% block content %}
    <!-- navbar -->
    <c-components.layout.header></c-components.layout.header>
    <div class="w-full flex justify-center">
        <div class="w-full max-w-7xl py-4 ">
            <!-- header section -->
           <div class="flex justify-between items-end py-6 mb-2">
                <div class="flex flex-col">
                    <h2 class="text-3xl font-bold">Dashboard</h2>
                    <p class="text-md font-normal text-neutral/50">Manage your reports</p>
                </div>
               <c-components.dashboard_nav></c-components.dashboard_nav>
           </div>
            <!-- filter section -->
            <div class="w-full bg-base-200 p-4 rounded-xl shadow">
                <form
                    hx-get="{% url 'received_offers' %}"
                    hx-target="#my_reports"
                    hx-push-url="true"
                    hx-trigger="input delay:500ms, change"
                    class="flex flex-col md:flex-row gap-3 md:items-center">
                    <select id="date_filter" class="select select-bordered w-full" name="date_filter">
                        <option value="all" {% if date_filter == 'all' %} selected {% endif %}>All time</option>
                        {% for filter in date_filters %}
                            <option
                                    value="{{ filter.num_days }}"
                                    {% if date_filter == filter.num_days|stringformat:"s" %}selected{% endif %}
                            >
                                {{ filter.label }}
                            </option>
                        {% endfor %}
                    </select>

                    <!-- Status Select -->
                    <select class="select select-bordered w-full md:w-52" name="status">
                        {% for status in statuses %}
                            <option value="{{ status }}" {% if status == current_status %}selected{% endif %}>{{ status|title }}</option>
                        {% endfor %}
                    </select>

                    <!-- Status Select -->
                    <select class="select select-bordered w-full md:w-52" name="category">
                        <option value="all" {% if category == 'all' %} selected {% endif %}>All</option>
                        {% for category in categories %}
                            <option value="{{ category.slug }}" {% if category.slug == category %}selected{% endif %}>
                                {{ category.name }}
                            </option>
                        {% endfor %}
                    </select>

                    <!-- Reset Button -->
                    <button
                        hx-get="{% url 'my_reports' %}"
                        hx-target="#body"
                        hx-push-url="true"
                        type="button" class="btn bg-base-100 shadow-xs w-full md:w-auto">
                        <c-icons.refresh_ccw></c-icons.refresh_ccw>
                        Reset Filters
                    </button>
                </form>
            </div>

            <div class="flex justify-between items-center py-3 my-3">
                <p class="text-xl font-bold">My Reports</p>
                <button class="btn btn-primary">
                    <c-icons.plus></c-icons.plus>
                    Report an illegal dumping
                </button>
            </div>
            <div id="reports">
                <c-partials.my_reports_partial></c-partials.my_reports_partial>
            </div>
        </div>
    </div>
{% endblock %}
