{% extends "cotton/components/layout/base.html" %}

{% block title %}
    <title>Edit Account</title>
{% endblock %}

{% block content %}
    <c-components.layout.header></c-components.layout.header>

    <div class="w-full flex justify-center bg-base-200/40">
        <div class="w-full max-w-5xl px-4 py-8 lg:px-6">
            <div class="flex flex-col gap-4 mb-8">
                <div>
                    <h1 class="text-4xl font-bold">Edit Account</h1>
                    <p class="text-base text-neutral/60 mt-2">Update the editable fields on your custom user profile.</p>
                </div>
                <c-components.account_nav></c-components.account_nav>
            </div>

            <div class="card bg-base-100 shadow">
                <div class="card-body gap-6">
                    <h2 class="card-title text-2xl">Profile Details</h2>

                    <form method="post" class="flex flex-col gap-3">
                        {% csrf_token %}

                        <label class="form-control w-full">
                            <div class="label">
                                <span class="label-text">Email</span>
                            </div>
                            {{ form.email }}
                            {% if form.email.errors %}
                                <p class="text-sm text-error mt-2">{{ form.email.errors.0 }}</p>
                            {% endif %}
                            {% if user_has_social_account %}
                                <p class="text-sm text-neutral/60 mt-2">Email cannot be changed for social login accounts</p>
                            {% endif %}
                        </label>

                        <label class="form-control w-full">
                            <div class="label">
                                <span class="label-text">Display Name</span>
                            </div>
                            {{ form.display_name }}
                            {% if form.display_name.errors %}
                                <p class="text-sm text-error mt-2">{{ form.display_name.errors.0 }}</p>
                            {% endif %}
                        </label>

                        <label class="form-control w-full">
                            <div class="label">
                                <span class="label-text">WhatsApp Number</span>
                            </div>
                            {{ form.whatsapp_number }}
                            {% if form.whatsapp_number.errors %}
                                <p class="text-sm text-error mt-2">{{ form.whatsapp_number.errors.0 }}</p>
                            {% endif %}
                        </label>

                        <div class="flex flex-col gap-3 sm:flex-row">
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                            <a href="{% url 'account_overview' %}" class="btn btn-outline">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
