<div class="navbar bg-base-100 shadow-sm sticky top-0 z-40 px-2 md:px-6">
    <div class="navbar-start">
        <div class="dropdown">
            <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                     stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16"/>
                </svg>
            </div>
            <ul
                tabindex="-1"
                class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
                <li>
                    <c-components.ui.nav_link
                        text="Home"
                        curr_path="home"
                        url="{% url 'home' %}">
                    </c-components.ui.nav_link>
                </li>
                <li>
                    <c-components.ui.nav_link
                        text="Listings"
                        curr_path="listings"
                        url="{% url 'listings' %}">
                    </c-components.ui.nav_link>
                </li>
                {% if request.user.is_authenticated %}
                    <li>
                        <c-components.ui.nav_link
                            text="Dashboard"
                            curr_path="my_listings"
                            url="{% url 'my_listings' request.user.id %}">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user-icon lucide-user">
                                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                        </c-components.ui.nav_link>
                    </li>
                {% endif %}
            </ul>
        </div>
        <a class="btn btn-ghost text-xl">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-recycle-icon lucide-recycle"><path d="M7 19H4.815a1.83 1.83 0 0 1-1.57-.881 1.785 1.785 0 0 1-.004-1.784L7.196 9.5"/><path d="M11 19h8.203a1.83 1.83 0 0 0 1.556-.89 1.784 1.784 0 0 0 0-1.775l-1.226-2.12"/><path d="m14 16-3 3 3 3"/><path d="M8.293 13.596 7.196 9.5 3.1 10.598"/>
                <path d="m9.344 5.811 1.093-1.892A1.83 1.83 0 0 1 11.985 3a1.784 1.784 0 0 1 1.546.888l3.943 6.843"/>
                <path d="m13.378 9.633 4.096 1.098 1.097-4.096"/>
            </svg>
            NouProp
        </a>
    </div>
    <div class="navbar-center hidden lg:flex">
        <ul class="menu menu-horizontal px-1 gap-2">
            <li class="">
                <c-components.ui.nav_link
                    text="Home"
                    curr_path="home"
                    url="{% url 'home' %}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                         class="lucide lucide-house-icon lucide-house">
                        <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/>
                        <path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    </svg>
                </c-components.ui.nav_link>
            </li>
            <li>
                <c-components.ui.nav_link
                    text="Listings"
                    curr_path="listings"
                    url="{% url 'listings' %}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-list-icon lucide-list">
                        <path d="M3 5h.01"/>
                        <path d="M3 12h.01"/><path d="M3 19h.01"/>
                        <path d="M8 5h13"/>
                        <path d="M8 12h13"/>
                        <path d="M8 19h13"/>
                    </svg>
                </c-components.ui.nav_link>
            </li>
            {% if request.user.is_authenticated %}
                <li>
                    <c-components.ui.nav_link
                        text="Dashboard"
                        curr_path="my_listings"
                        url="{% url 'my_listings' request.user.id %}">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user-icon lucide-user">
                            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </c-components.ui.nav_link>
                </li>
            {% endif %}
        </ul>
    </div>
    <div class="navbar-end space-x-3">
        {% if request.user.is_authenticated %}
            <c-components.ui.nav_link
                text="Dashboard"
                curr_path="my_listings"
                url="{% url 'my_listings' request.user.id %}">
            </c-components.ui.nav_link>
        {% else %}
            <a href="{% url 'account_login' %}" class="btn btn-ghost">
                Log In
            </a>
            <a href="{% url 'account_signup' %}" class="btn btn-primary">Sign Up</a>
        {% endif %}
    </div>
</div>
