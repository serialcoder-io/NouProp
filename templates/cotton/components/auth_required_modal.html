<dialog id="not_logged_modal" class="modal">
    <div class="modal-box text-center">

        <h3 class="text-lg font-bold">Authentication required</h3>

        <p class="py-4">
            You are not logged in. Please login to make an offer.
        </p>

        <div class="flex gap-3 justify-center mt-4">

            <!-- LOGIN -->
            <a href="{% url 'account_login' %}?next={{next}}"
               class="btn btn-primary">
                Login
            </a>

            <!-- CLOSE -->
            <button class="btn" onclick="not_logged_modal.close()">
                Close
            </button>

        </div>

    </div>
    <!-- backdrop -->
    <form method="dialog" class="modal-backdrop">
        <button>close</button>
    </form>
</dialog>
