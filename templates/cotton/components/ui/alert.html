<div class="alert {% if message.tags == 'success' %}alert-success{% endif %}
    {% if message.tags == 'error' %}alert-error{% endif %}
    {% if message.tags == 'warning' %}alert-warning{% endif %}
    {% if message.tags == 'info' %}alert-info{% endif %}
    text-white">
    <span>{{ message }}</span>
    <button class="btn btn-ghost" onclick="this.closest('.alert').remove()">X</button>
</div>
